services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5060:8000"
    volumes:
      - ./models:/models
      - ./data:/home/user/app/data
      - ./sample_docs:/home/user/app/sample_docs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_MODE=local
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MODEL_PATH=/models/ibm-granite_granite-4.1-3b-Q4_K_M.gguf
      - DATABASE_URL=sqlite:////home/user/app/data/spectre.db
      - CHROMA_PERSIST_DIR=/home/user/app/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5070:8501"
    depends_on:
      backend:
        condition: service_started
    environment:
      - API_BASE_URL=http://backend:8000
